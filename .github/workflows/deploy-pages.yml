name: Deploy Robotaxi to GitHub Pages
run-name: ${{ github.event.head_commit.message || inputs.version }} · Deploy Robotaxi to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "要发布的版本号，例如 v041.4.0"
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Verify release version
        run: |
          RELEASE_VERSION="$(sed -n 's/^## \(v[^ ]*\).*/\1/p' VERSION.md | head -n 1)"
          node scripts/verify-release-version.mjs "$RELEASE_VERSION"
          git tag --points-at HEAD --list "$RELEASE_VERSION" | grep -qx "$RELEASE_VERSION"
          git log -1 --format=%s | grep -q "^$RELEASE_VERSION[:： ]"

      - name: Build static site
        run: node scripts/build-github-pages.mjs

      - name: Verify deployment artifact
        run: node scripts/verify-github-pages-build.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
