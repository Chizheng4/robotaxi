name: Deploy Robotaxi to GitHub Pages
run-name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }} · Deploy Robotaxi to GitHub Pages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "要发布的版本号，例如 v041.4.0"
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Verify release version
        env:
          RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
        run: node scripts/verify-release-version.mjs "$RELEASE_VERSION"

      - name: Build static site
        run: node scripts/build-github-pages.mjs

      - name: Verify deployment artifact
        run: node scripts/verify-github-pages-build.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
